data:
  genome_fasta: "mm10/mm10.fa"
  chrom_sizes: "mm10/mm10.chrom.sizes"
  data_matrix: "data/pcg_norm_1000bp.parquet"
  regions_file: null
  selected_tracks: null
  genome_tile_size: 1000000
  exclude_chroms:
    - chrM
  val_chroms:
    - chr8
    - chr9
  test_chroms:
    - chr14
    - chr10
    - chr15
    - chr4
  split_by_chrom: true

model:
  name: "johahi/borzoi-replicate-0"
  seq_len: 2048
  pred_len: 768
  bin_size: 32
  freeze_trunk: false
  num_output_tasks: null

training:
  batch_size: 512        # Linear Probe Batch Size
  finetune_batch_size: 96 # Fine-tuning Batch Size

  epochs: 100
  learning_rate: 0.0001
  head_learning_rate: 0.0002
  finetune_learning_rate: 0.00005
  optimizer: "adamw"
  weight_decay: 0.00000001
  weight_decay_transformer: 0.00000002
  loss: "cosine_mse_log"
  loss_center_crop_bp: 768   # Center-crop loss to avoid boundary effects (paper default)
  mixed_precision: true
  clip_grad_norm: 0.2
  linear_probe_epochs: 6
  linear_probe_early_stopping_patience: 5

  warmup_steps: 1000
  early_stopping_patience: 15  
  min_improvement: 0.001
  reduce_lr_on_plateau: false    # Forced Linear Decay for stability

  lr_patience: 10
  lr_factor: 0.5
  lr_min: 0.000001
  num_workers: 4
  use_sync_batchnorm: false

augmentation:
  reverse_complement: true
  shift_max: 3
  squash_targets: false
  use_random_crop: false  # Tiling mode
  samples_per_region: 1   # Not used in tiling mode
  tile_stride: 384

performance:
  lazy_loading: true
  cache_file: null

distributed:
  enabled: true
  num_gpus: 8

logging:
  use_wandb: true
  wandb_project: "borzoi-finetune"
  wandb_run_name: "2kb_norm_cosine_mse_log_new_chroms_center_crop"

  checkpoint_dir: "checkpoints/2kb_norm_cosine_mse_log_new_chroms_center_crop"
  save_best_only: false

  eval_every_n: 1000
  save_every_n: 1000
  log_every_n: 10

inference:
  run_after_training: true
  mode: "genome"
  output_dir: "predictions/2kb_norm_cosine_mse_log_new_chroms_center_crop"
  output_format:
    - "bigwig"

  batch_size: 1024

  checkpoint: "best_model"
  use_rc_average: true
  mixed_precision: true
  num_workers: 4
  bigwig_jobs: 10

misha_track:
  enabled: true
  groot: "misha_db/mm10"
  track_prefix: "seq.IQ.pcg.borzoi.finetune_norm_2k_"
  suffix: "_cropped"
  binsize: 32
